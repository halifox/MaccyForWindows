name: clipboard
description: "A cross-platform clipboard manager inspired by Maccy."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management & UI Hooks
  flutter_riverpod: ^3.1.0
  hooks_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  flutter_hooks: ^0.21.1

  # Database (Drift/SQLite)
  drift: ^2.16.0
  drift_flutter: ^0.2.8
  sqlite3_flutter_libs: ^0.5.21
  path_provider: ^2.1.3
  path: ^1.9.0

  # Routing
  go_router: ^17.0.1

  # Window & System Integration
  window_manager: ^0.5.1
  tray_manager: ^0.5.2
  hotkey_manager: ^0.2.3
  desktop_multi_window: ^0.2.0
  clipboard_watcher: ^0.3.0
  screen_retriever: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.9
  riverpod_generator: ^4.0.0+1
  drift_dev: ^2.16.0
  riverpod_lint: ^3.1.0
  custom_lint: ^0.8.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png